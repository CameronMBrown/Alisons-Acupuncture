name: Deploy to production

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Trust Hostinger host key
        run: ssh-keyscan -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy theme
        run: |
          rsync -avz --delete -e "ssh -p ${{ secrets.HOSTINGER_PORT }}" \
            wp-content/themes/alisonsacupuncture/ \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:domains/alisonsacupuncture.com/public_html/wp-content/themes/alisonsacupuncture/

      - name: Deploy oceanwp parent theme
        run: |
          rsync -avz --delete -e "ssh -p ${{ secrets.HOSTINGER_PORT }}" \
            wp-content/themes/oceanwp/ \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:domains/alisonsacupuncture.com/public_html/wp-content/themes/oceanwp/

      - name: Deploy plugins
        run: |
          for plugin in advanced-custom-fields classic-editor wordpress-seo; do
            rsync -avz --delete -e "ssh -p ${{ secrets.HOSTINGER_PORT }}" \
              "wp-content/plugins/$plugin/" \
              "${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:domains/alisonsacupuncture.com/public_html/wp-content/plugins/$plugin/"
          done
